# .sops.yaml — SOPS configuration file
# This file tells SOPS which keys to use when encrypting/decrypting files,
# matched by path regex. It is SAFE to commit — it only contains public keys.
#
# SETUP GUIDE:
#   1. Install age:      brew install age   OR   apt install age
#   2. Generate keypair: age-keygen -o ~/.config/sops/age/keys.txt
#   3. Copy the PUBLIC key (starts with "age1...") into the recipients below.
#   4. NEVER commit keys.txt — it contains your private key.
#   5. Set environment variable for decryption:
#        export SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt
#
# MULTI-OPERATOR SETUP:
#   Add each operator's public age key as an additional recipient.
#   Any one private key can decrypt; all public keys are used to encrypt.
# =============================================================================

creation_rules:
  # ---------------------------------------------------------------------------
  # Common shared secrets — one file at the live/ root.
  # Holds: Backblaze state backend, SSH public key, OVH API creds.
  # ---------------------------------------------------------------------------
  - path_regex: infrastructure/tofu/live/common(\.sops)?\.json$
    key_groups:
      - age:
          - &primary age1kttje7qaqggnssmu4a40ptm649wthp0twmd4c9jsjstkpnuptqdqp3fkc0
          - &ci     age15m998ttvguwq46xpz4e6yvdaaprxzucqr33t98c3mtgrlcymwgfsfew9ch

  # ---------------------------------------------------------------------------
  # Per-node secrets — only holds what is unique to that node.
  # ---------------------------------------------------------------------------
  - path_regex: infrastructure/tofu/live/.*/secrets(\.sops)?\.json$
    key_groups:
      - age:
          - *primary
          - *ci

  # ---------------------------------------------------------------------------
  # Ansible group_vars secrets — YAML format
  # ---------------------------------------------------------------------------
  - path_regex: ansible/group_vars/.*/vault(\.sops)?\.yml$
    key_groups:
      - age:
          - *primary
          - *ci

  - path_regex: ansible/host_vars/.*/vault(\.sops)?\.yml$
    key_groups:
      - age:
          - *primary
          - *ci

  # ---------------------------------------------------------------------------
  # Kubernetes secrets (future use)
  # ---------------------------------------------------------------------------
  - path_regex: \.sops\.ya?ml$
    key_groups:
      - age:
          - *primary
          - *ci
