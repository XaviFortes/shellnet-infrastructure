name: Validate IaC

on:
  pull_request:
  push:
    branches: [main]

# Shared tool versions — update here to bump everywhere
env:
  TOFU_VERSION: "1.11.1"
  TERRAGRUNT_VERSION: "1.0.4"
  SOPS_VERSION: "3.9.4"
  AGE_VERSION: "1.2.1"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Verify no unencrypted secrets are present in the repository.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Leak Scan
    runs-on: homelab
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git grep

      - name: Run secret validation script
        run: bash scripts/validate.sh

  # ---------------------------------------------------------------------------
  # Job 2: Validate OpenTofu formatting and configuration.
  # Requires SOPS_AGE_KEY secret in GitHub → Settings → Secrets.
  # The key is the FULL content of your keys.txt (private key + public key).
  # ---------------------------------------------------------------------------
  tofu-validate:
    name: OpenTofu Validate
    runs-on: homelab
    needs: secret-scan
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tools (tofu / terragrunt / sops / age)
        run: |
          set -euo pipefail
          install_if_missing() {
            local name="$1"; local url="$2"; local dest="${3:-/usr/local/bin/$name}"
            if command -v "$name" &>/dev/null; then
              echo "✓ $name already installed: $(command -v $name)"
            else
              echo "Installing $name..."
              curl -sLo "$dest" "$url" && chmod +x "$dest"
            fi
          }
          install_if_missing tofu \
            "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz" && \
            { command -v tofu || (curl -sL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz" | tar -xz -C /usr/local/bin tofu); } || true
          if ! command -v tofu &>/dev/null; then
            curl -sL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin tofu
          fi
          if ! command -v terragrunt &>/dev/null; then
            sudo curl -sLo /usr/local/bin/terragrunt \
              "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
            sudo chmod +x /usr/local/bin/terragrunt
          fi
          if ! command -v sops &>/dev/null; then
            sudo curl -sLo /usr/local/bin/sops \
              "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
            sudo chmod +x /usr/local/bin/sops
          fi
          if ! command -v age-keygen &>/dev/null; then
            curl -sL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local/bin age/age age/age-keygen
          fi
          echo "tofu:       $(tofu version | head -1)"
          echo "terragrunt: $(terragrunt --version)"
          echo "sops:       $(sops --version)"

      - name: Terragrunt format check
        run: terragrunt hcl fmt --check --diff
        working-directory: infrastructure/tofu/live

      - name: OpenTofu format check
        run: tofu fmt -check -recursive
        working-directory: infrastructure/tofu/modules

      - name: Terragrunt validate (all modules)
        run: terragrunt run --all validate --non-interactive
        working-directory: infrastructure/tofu/live

  # ---------------------------------------------------------------------------
  # Job 3: Lint Ansible playbooks.
  # ---------------------------------------------------------------------------
  ansible-lint:
    name: Ansible Lint
    runs-on: homelab
    needs: secret-scan
    env:
      # Required so community.sops vars plugin fires during playbook execution
      ANSIBLE_VARS_SOPS_PLUGIN_STAGE: task
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint and community.sops
        run: |
          # Use a venv to avoid PEP 668 externally-managed-environment error
          python3 -m venv /tmp/ansible-venv
          /tmp/ansible-venv/bin/pip install --quiet --upgrade ansible-lint ansible
          echo "/tmp/ansible-venv/bin" >> "$GITHUB_PATH"
          /tmp/ansible-venv/bin/ansible-galaxy collection install community.sops --upgrade

      - name: Run ansible-lint
        run: ansible-lint
        working-directory: ansible

  # ---------------------------------------------------------------------------
  # Job 4a: Terragrunt plan — OVH / public stacks (no Proxmox API access needed).
  # ---------------------------------------------------------------------------
  tofu-plan-ovh:
    name: OpenTofu Plan (OVH)
    runs-on: homelab
    needs: tofu-validate
    permissions:
      pull-requests: write
      contents: read
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tools (tofu / terragrunt / sops / age)
        run: |
          set -euo pipefail
          if ! command -v tofu &>/dev/null; then
            curl -sL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin tofu
          fi
          if ! command -v terragrunt &>/dev/null; then
            sudo curl -sLo /usr/local/bin/terragrunt \
              "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
            sudo chmod +x /usr/local/bin/terragrunt
          fi
          if ! command -v sops &>/dev/null; then
            sudo curl -sLo /usr/local/bin/sops \
              "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
            sudo chmod +x /usr/local/bin/sops
          fi
          if ! command -v age-keygen &>/dev/null; then
            curl -sL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local/bin age/age age/age-keygen
          fi

      - name: Terragrunt plan (OVH stacks only)
        id: plan
        run: |
          set +e
          # Only plan OVH stacks — run from each OVH subdirectory to avoid
          # evaluating Proxmox stack locals (which need LAN SOPS secrets).
          EXIT_CODE=0
          for dir in ovh ovh-gra; do
            (cd "$dir" && terragrunt run --all plan --non-interactive 2>&1) | tee -a /tmp/plan_output.txt
            LAST=${PIPESTATUS[0]}
            [ $LAST -ne 0 ] && EXIT_CODE=$LAST
          done
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          OUTPUT=$(cat /tmp/plan_output.txt)
          if [ ${#OUTPUT} -gt 60000 ]; then
            OUTPUT="...(truncated — see Actions log for full output)...${OUTPUT: -60000}"
            printf '%s' "$OUTPUT" > /tmp/plan_output.txt
          fi
          echo "Plan exit code: ${EXIT_CODE}"
          exit $EXIT_CODE
        working-directory: infrastructure/tofu/live

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ Success' : '❌ Failed';

            const body = [
              `## Terragrunt Plan (OVH) — ${status}`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by commit \`${{ github.sha }}\` on branch \`${{ github.head_ref }}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.login === 'github-actions[bot]' &&
                  comment.body.startsWith('## Terragrunt Plan (OVH)')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ---------------------------------------------------------------------------
  # Job 4b: Terragrunt plan — Proxmox stacks (requires LAN access to 10.0.x.x).
  # Runs on homelab-proxmox runner (ci-runner LXC on peanut, vmid 110).
  # ---------------------------------------------------------------------------
  tofu-plan-proxmox:
    name: OpenTofu Plan (Proxmox)
    runs-on: homelab-proxmox
    needs: tofu-validate
    permissions:
      pull-requests: write
      contents: read
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tools (tofu / terragrunt / sops / age)
        run: |
          set -euo pipefail
          if ! command -v tofu &>/dev/null; then
            curl -sL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin tofu
          fi
          if ! command -v terragrunt &>/dev/null; then
            sudo curl -sLo /usr/local/bin/terragrunt \
              "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
            sudo chmod +x /usr/local/bin/terragrunt
          fi
          if ! command -v sops &>/dev/null; then
            sudo curl -sLo /usr/local/bin/sops \
              "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
            sudo chmod +x /usr/local/bin/sops
          fi
          if ! command -v age-keygen &>/dev/null; then
            curl -sL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local/bin age/age age/age-keygen
          fi

      - name: Terragrunt plan (Proxmox stacks only)
        id: plan
        run: |
          set +e
          # Only plan stacks that need direct Proxmox API access (10.0.1.1 / 10.0.2.1)
          # Run from each Proxmox node subdirectory to avoid evaluating OVH locals.
          EXIT_CODE=0
          for dir in peanut almond; do
            (cd "$dir" && terragrunt run --all plan --non-interactive 2>&1) | tee -a /tmp/plan_output.txt
            LAST=${PIPESTATUS[0]}
            [ $LAST -ne 0 ] && EXIT_CODE=$LAST
          done
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          OUTPUT=$(cat /tmp/plan_output.txt)
          if [ ${#OUTPUT} -gt 60000 ]; then
            OUTPUT="...(truncated — see Actions log for full output)...${OUTPUT: -60000}"
            printf '%s' "$OUTPUT" > /tmp/plan_output.txt
          fi
          echo "Plan exit code: ${EXIT_CODE}"
          exit $EXIT_CODE
        working-directory: infrastructure/tofu/live

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ Success' : '❌ Failed';

            const body = [
              `## Terragrunt Plan (Proxmox) — ${status}`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```',
              planOutput,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by commit \`${{ github.sha }}\` on branch \`${{ github.head_ref }}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.login === 'github-actions[bot]' &&
                  comment.body.startsWith('## Terragrunt Plan (Proxmox)')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ---------------------------------------------------------------------------
  # Job 5: Terragrunt apply (main branch only).
  # Requires 'production' GitHub Environment with required reviewers configured.
  # Uses read-write B2 keys (B2_RW_ACCESS_KEY_ID / B2_RW_SECRET_KEY).
  # ---------------------------------------------------------------------------
  tofu-apply-ovh:
    name: OpenTofu Apply (OVH)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: homelab
    needs: [tofu-plan-ovh, tofu-plan-proxmox]
    environment: production
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_RW_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_RW_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tools (tofu / terragrunt / sops / age)
        run: |
          set -euo pipefail
          if ! command -v tofu &>/dev/null; then
            curl -sL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin tofu
          fi
          if ! command -v terragrunt &>/dev/null; then
            sudo curl -sLo /usr/local/bin/terragrunt \
              "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
            sudo chmod +x /usr/local/bin/terragrunt
          fi
          if ! command -v sops &>/dev/null; then
            sudo curl -sLo /usr/local/bin/sops \
              "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
            sudo chmod +x /usr/local/bin/sops
          fi
          if ! command -v age-keygen &>/dev/null; then
            curl -sL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local/bin age/age age/age-keygen
          fi

      - name: Terragrunt apply (OVH stacks)
        run: |
          for dir in ovh ovh-gra; do
            (cd "$dir" && terragrunt run --all apply --non-interactive --auto-approve)
          done
        working-directory: infrastructure/tofu/live

  tofu-apply-proxmox:
    name: OpenTofu Apply (Proxmox)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: homelab-proxmox
    needs: [tofu-plan-ovh, tofu-plan-proxmox]
    environment: production
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_RW_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_RW_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tools (tofu / terragrunt / sops / age)
        run: |
          set -euo pipefail
          if ! command -v tofu &>/dev/null; then
            curl -sL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin tofu
          fi
          if ! command -v terragrunt &>/dev/null; then
            sudo curl -sLo /usr/local/bin/terragrunt \
              "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
            sudo chmod +x /usr/local/bin/terragrunt
          fi
          if ! command -v sops &>/dev/null; then
            sudo curl -sLo /usr/local/bin/sops \
              "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
            sudo chmod +x /usr/local/bin/sops
          fi
          if ! command -v age-keygen &>/dev/null; then
            curl -sL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local/bin age/age age/age-keygen
          fi

      - name: Terragrunt apply (Proxmox stacks)
        run: |
          for dir in peanut almond; do
            (cd "$dir" && terragrunt run --all apply --non-interactive --auto-approve)
          done
        working-directory: infrastructure/tofu/live
