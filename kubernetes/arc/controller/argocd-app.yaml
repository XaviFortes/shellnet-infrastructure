---
# kubernetes/arc/controller/argocd-app.yaml
# ArgoCD Application that installs the ARC scale-set controller via Helm.
# The controller manages runner scale sets across all repos.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set-controller
    targetRevision: "0.9.3"
    helm:
      releaseName: arc-controller
      values: |
        # The controller runs in arc-systems and manages runner scale sets
        # in all namespaces.
        replicaCount: 1

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # Metrics for Prometheus scraping (if you have kube-prometheus-stack)
        metrics:
          controllerManagerAddr: ":8080"
          listenerAddr: ":8080"
          listenerEndpoint: "/metrics"

  destination:
    server: https://kubernetes.default.svc
    namespace: arc-systems

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true          # needed for large CRDs that exceed annotation size limit

  # Ignore annotation diffs on CRDs — Helm doesn't manage CRD updates via
  # helm upgrade, so ArgoCD sees a perpetual drift on metadata.annotations.
  # The controller and its behaviour are unaffected; only the diff is suppressed.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: autoscalingrunnersets.actions.github.com
      jsonPointers: ["/metadata/annotations"]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: ephemeralrunnersets.actions.github.com
      jsonPointers: ["/metadata/annotations"]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: ephemeralrunners.actions.github.com
      jsonPointers: ["/metadata/annotations"]
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: autoscalinglisteners.actions.github.com
      jsonPointers: ["/metadata/annotations"]
