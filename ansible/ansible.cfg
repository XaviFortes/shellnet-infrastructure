# ansible.cfg
# Ansible configuration for the homelab.
# Note: sensitive values (passwords, tokens) are never stored here.
# Use SOPS-encrypted group_vars/*/vault.sops.yml instead.

[defaults]
inventory          = inventories/
roles_path         = roles/
collections_paths  = ~/.ansible/collections:/Users/fortes/miniconda3/lib/python3.13/site-packages/ansible_collections
retry_files_enabled = False
host_key_checking  = True
stdout_callback    = ansible.builtin.default
result_format      = yaml
callbacks_enabled  = timer, profile_tasks

# SOPS integration: decrypt vault files transparently via the community plugin
# Install: ansible-galaxy collection install community.sops
vars_plugins_enabled = host_group_vars,community.sops.sops

[community.sops]
# Must be 'task' so the vars plugin fires during playbook execution.
# The default 'inventory' stage is only called during ansible-inventory / ad-hoc
# runs in Ansible 2.20+ and does NOT load vars during playbook task execution.
vars_stage = task

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root

[ssh_connection]
ssh_args      = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=yes
pipelining    = True
