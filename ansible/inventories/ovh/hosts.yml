---
# ansible/inventories/ovh/hosts.yml
#
# IMPORTANT — NO IPs IN THIS FILE.
# OVH VPS public IPs are sensitive (direct internet-facing attack surface).
# They are stored encrypted in ansible/group_vars/ovh_k3s/vault.sops.yml
# and resolved at runtime via the community.sops vars plugin.
#
# Cluster: ovh-k3s-ha (K3s v1.33.5) — Madrid LocalZone (MAD1)
# All 3 VPS act as control-plane + etcd nodes (embedded etcd HA).
# The homelab VM k3s-ha-ovh-es (almond/2106) joins as a worker (role=homelab).
#
# Hardware per node: AMD EPYC Genoa 4vCPU / 8GB RAM / 75GB NVMe / Debian 13

all:
  children:

    ovh_k3s:
      vars:
        ansible_user: debian
        ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=yes"
        ansible_python_interpreter: /usr/bin/python3

      hosts:
        vps-6b58f204:
          ansible_host: "{{ vault_ovh_ip_vps_6b58f204 }}"
          k3s_role: server
          flannel_subnet: "10.42.0.0/24"
          longhorn_extra_disk: true     # /dev/sdc block device (5GB+)
          k3s_node_labels:
            - "topology.kubernetes.io/zone=mad1-a"
            - "node-role.kubernetes.io/vps=true"

        vps-04483f6e:
          ansible_host: "{{ vault_ovh_ip_vps_04483f6e }}"
          k3s_role: server
          flannel_subnet: "10.42.2.0/24"
          wireguard_hub: true           # wg0 present, 10.8.0.1/24, runs wg-easy
          k3s_node_labels:
            - "topology.kubernetes.io/zone=mad1-b"
            - "node-role.kubernetes.io/vps=true"

        vps-d147fb4d:
          ansible_host: "{{ vault_ovh_ip_vps_d147fb4d }}"
          k3s_role: server
          flannel_subnet: "10.42.1.0/24"
          k3s_node_labels:
            - "topology.kubernetes.io/zone=mad1-c"
            - "node-role.kubernetes.io/vps=true"

    # All 3 VPS act as K3s servers (control-plane + etcd)
    ovh_k3s_servers:
      hosts:
        vps-6b58f204:
        vps-04483f6e:
        vps-d147fb4d:

    # The WireGuard hub node gets its own group for targeted plays
    ovh_wireguard_hub:
      hosts:
        vps-04483f6e:
