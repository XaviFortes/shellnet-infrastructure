---
# ansible/inventories/peanut/hosts.yml
# Inventory for peanut node: AMD Ryzen 5 3600 | 32GB RAM
# Specific IPs are resolved via internal DNS / hosts file — not hardcoded here.

all:
  children:

    proxmox:
      hosts:
        peanut.lan:
          ansible_user: root
          ansible_ssh_private_key_file: "~/.ssh/homelab_ed25519"

    # --- LXC Containers on peanut ---
    lxc_peanut:
      hosts:
        nginxproxymanager.lan:
          ansible_user: root
          container_id: 102
        adguard.lan:
          ansible_user: root
          container_id: 109
        homarr.lan:
          ansible_user: root
          container_id: 103
        postgres-replica.lan:
          ansible_user: root
          container_id: 3001

    # --- VMs on peanut ---
    vms_peanut:
      hosts:
        k3s.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 101
        haos.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 106
        truenas.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 104
        kubeadm-h2.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 108

    # --- K3s agent on peanut ---
    k3s_agent:
      hosts:
        k3s.lan:

    # --- Kubeadm cross-node worker ---
    kubeadm_workers:
      hosts:
        kubeadm-h2.lan:
