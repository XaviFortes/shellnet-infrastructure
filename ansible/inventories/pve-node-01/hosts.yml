---
# ansible/inventories/pve-node-01/hosts.yml
# Static inventory for Proxmox node 01.
# IPs and hostnames below use internal LAN names — not publicly routable.
# For portfolio purposes: specific IPs are intentionally omitted.

all:
  children:

    proxmox:
      hosts:
        pve-01.lan:
          ansible_user: "{{ vault_ansible_user }}"   # from vault.sops.yml
          ansible_ssh_private_key_file: "~/.ssh/homelab_ed25519"

    lxc:
      hosts:
        dns-01.lan:
          ansible_user: root
        monitoring-01.lan:
          ansible_user: root

    k3s:
      children:
        k3s_server:
          hosts:
            k3s-server-01.lan:
              ansible_user: "{{ vault_ansible_user }}"
        k3s_agent:
          hosts:
            k3s-agent-01.lan:
              ansible_user: "{{ vault_ansible_user }}"
            k3s-agent-02.lan:
              ansible_user: "{{ vault_ansible_user }}"
