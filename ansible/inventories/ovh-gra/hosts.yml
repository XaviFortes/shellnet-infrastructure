---
# ansible/inventories/ovh-gra/hosts.yml
#
# IMPORTANT — NO IPs IN THIS FILE.
# The public IP for vps-f24bf8b4 is stored encrypted in
# ansible/group_vars/ovh_gra/vault.sops.yml
#
# Node: vps-f24bf8b4 — Gravelines GRA8, Debian 12, 2vCPU/2GB/40GB
# Role: Edge/bastion — HAProxy L4/L7 termination, Redis, Tailscale, WireGuard

all:
  children:

    ovh_gra:
      vars:
        ansible_user: debian
        ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=yes"
        ansible_python_interpreter: /usr/bin/python3

      hosts:
        vps-f24bf8b4:
          ansible_host: "{{ vault_ovh_ip_vps_f24bf8b4 }}"

    ovh_haproxy:
      hosts:
        vps-f24bf8b4:

    ovh_edge:
      hosts:
        vps-f24bf8b4:
