---
# ansible/inventories/almond/hosts.yml
# Inventory for almond node: AMD Ryzen 7 5800X | 64GB RAM
# Specific IPs are resolved via internal DNS / hosts file — not hardcoded here.

all:
  children:

    proxmox:
      hosts:
        almond.lan:
          ansible_user: root
          ansible_ssh_private_key_file: "~/.ssh/homelab_ed25519"

    # --- LXC Containers on almond ---
    lxc_almond:
      hosts:
        minecraft.lan:
          ansible_user: root
          container_id: 2005
        wireguard.lan:
          ansible_user: root
          container_id: 2002
        postgres.lan:
          ansible_user: root
          container_id: 2003
        ttyd.lan:
          ansible_user: root
          container_id: 2006
        coder-server.lan:
          ansible_user: root
          container_id: 2004
        cloudflared.lan:
          ansible_user: root
          container_id: 2001

    # --- VMs on almond ---
    vms_almond:
      hosts:
        kadm-master.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 2108
        kadm-w1.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 2109
        kubeadm-deb.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 2102
        k3s-ha.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 2106
        docker.lan:
          ansible_user: "{{ vault_ansible_user }}"
          vmid: 2103

    # --- K3s cluster (server on almond) ---
    k3s_server:
      hosts:
        k3s-ha.lan:

    # --- Kubeadm control plane (on almond) ---
    kubeadm_control_plane:
      hosts:
        kadm-master.lan:

    kubeadm_workers:
      hosts:
        kadm-w1.lan:
        kubeadm-deb.lan:
