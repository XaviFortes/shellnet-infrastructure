---
# roles/common/tasks/main.yml
# Applied to every host: packages, timezone, NTP, SSH hardening, fail2ban, logrotate.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

# ── Timezone ────────────────────────────────────────────────────────────────

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

# ── NTP (systemd-timesyncd) ──────────────────────────────────────────────────

- name: Configure NTP servers in timesyncd.conf
  ansible.builtin.lineinfile:
    path: /etc/systemd/timesyncd.conf
    regexp: "^#?NTP="
    line: "NTP={{ ntp_servers | join(' ') }}"
    create: true
    mode: "0644"
  notify: Restart systemd-timesyncd

- name: Enable and start systemd-timesyncd
  ansible.builtin.service:
    name: systemd-timesyncd
    enabled: true
    state: started

# ── SSH hardening ────────────────────────────────────────────────────────────

- name: Harden sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/99-homelab-hardening.conf
    owner: root
    group: root
    mode: "0600"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Ensure sshd is enabled and started
  ansible.builtin.service:
    name: sshd
    enabled: true
    state: started

# ── fail2ban ─────────────────────────────────────────────────────────────────

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  when: fail2ban_enabled | bool

- name: Deploy fail2ban jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban
  when: fail2ban_enabled | bool

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
  when: fail2ban_enabled | bool

# ── logrotate ────────────────────────────────────────────────────────────────

- name: Set global logrotate retention
  ansible.builtin.lineinfile:
    path: /etc/logrotate.conf
    regexp: "^rotate "
    line: "rotate {{ log_retention_days }}"

# ── unattended-upgrades ───────────────────────────────────────────────────────

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"
