---
# roles/ovh-haproxy/handlers/main.yml

- name: Restart haproxy
  ansible.builtin.service:
    name: haproxy
    state: restarted

- name: Reload haproxy
  ansible.builtin.service:
    name: haproxy
    state: reloaded

- name: Restart redis
  ansible.builtin.service:
    name: redis-server
    state: restarted

- name: Restart wg-quick
  ansible.builtin.service:
    name: "wg-quick@{{ wireguard_interface }}"
    state: restarted
